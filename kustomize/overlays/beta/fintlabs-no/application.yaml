apiVersion: fintlabs.no/v1alpha1
kind: Application
metadata:
  name: fint-analytics-frontend
  labels:
    app.kubernetes.io/name: fint-analytics-frontend
    app.kubernetes.io/instance: fint-analytics-frontend_fintlabs_no
    app.kubernetes.io/version: latest
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: fint-core
    fintlabs.no/team: core
    fintlabs.no/org-id: fintlabs.no
spec:
  env:
    - name: ANALYTICS_TOKEN
      value: change-me
  port: 8000
  imagePullPolicy: Always
  orgId: fintlabs.no
  image: ghcr.io/fintlabs/fint-analytics-frontend
  imagePullSecrets:
    - ghcr
  ingress:
    enabled: true
  resources:
    limits:
      memory: "512Mi"
      cpu: "500m"
    requests:
      memory: "256Mi"
      cpu: "250m"
  restartPolicy: Always
